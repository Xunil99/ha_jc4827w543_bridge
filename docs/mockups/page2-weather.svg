<svg xmlns="http://www.w3.org/2000/svg" width="272" height="480" viewBox="0 0 272 480" font-family="Inter, system-ui, sans-serif">
  <rect width="272" height="480" fill="#000000"/>

  <!-- Header "5-Tage-Wetter" -->
  <text x="136" y="32" font-size="22" font-weight="700" fill="#22C55E" text-anchor="middle">5-Tage-Wetter</text>

  <!-- Tagesreihen-Helper: jede Reihe 86px hoch ab y=48 -->

  <!-- Tag 1: Mo, sonnig, 22°/14° -->
  <g transform="translate(0,60)">
    <text x="22"  y="22" font-size="22" font-weight="600" fill="#FFFFFF">Mo</text>
    <g transform="translate(100,4)">
      <circle cx="14" cy="14" r="8" fill="#60A5FA"/>
      <g stroke="#60A5FA" stroke-width="2" stroke-linecap="round">
        <line x1="14" y1="2"  x2="14" y2="-2"/>
        <line x1="14" y1="26" x2="14" y2="30"/>
        <line x1="2"  y1="14" x2="-2" y2="14"/>
        <line x1="26" y1="14" x2="30" y2="14"/>
      </g>
    </g>
    <text x="258" y="12" font-size="22" font-weight="700" fill="#22C55E" text-anchor="end">22°</text>
    <text x="258" y="38" font-size="14" fill="#3B82F6" text-anchor="end">14°</text>
  </g>

  <!-- Tag 2: Di, leicht bewölkt, 19°/12° -->
  <g transform="translate(0,146)">
    <text x="22"  y="22" font-size="22" font-weight="600" fill="#FFFFFF">Di</text>
    <g transform="translate(100,4)">
      <circle cx="10" cy="10" r="6" fill="#60A5FA"/>
      <ellipse cx="20" cy="20" rx="14" ry="8" fill="#9CA3AF"/>
    </g>
    <text x="258" y="12" font-size="22" font-weight="700" fill="#3B82F6" text-anchor="end">19°</text>
    <text x="258" y="38" font-size="14" fill="#3B82F6" text-anchor="end">12°</text>
  </g>

  <!-- Tag 3: Mi, Regen, 17°/11° -->
  <g transform="translate(0,232)">
    <text x="22"  y="22" font-size="22" font-weight="600" fill="#FFFFFF">Mi</text>
    <g transform="translate(100,4)">
      <ellipse cx="14" cy="12" rx="14" ry="7" fill="#9CA3AF"/>
      <line x1="9"  y1="22" x2="6"  y2="28" stroke="#60A5FA" stroke-width="2" stroke-linecap="round"/>
      <line x1="16" y1="22" x2="13" y2="28" stroke="#60A5FA" stroke-width="2" stroke-linecap="round"/>
      <line x1="23" y1="22" x2="20" y2="28" stroke="#60A5FA" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="258" y="12" font-size="22" font-weight="700" fill="#3B82F6" text-anchor="end">17°</text>
    <text x="258" y="38" font-size="14" fill="#3B82F6" text-anchor="end">11°</text>
  </g>

  <!-- Tag 4: Do, sonnig, 31°/22° (heiss, beide rot/gruen) -->
  <g transform="translate(0,318)">
    <text x="22"  y="22" font-size="22" font-weight="600" fill="#FFFFFF">Do</text>
    <g transform="translate(100,4)">
      <circle cx="14" cy="14" r="8" fill="#FACC15"/>
      <g stroke="#FACC15" stroke-width="2" stroke-linecap="round">
        <line x1="14" y1="2"  x2="14" y2="-2"/>
        <line x1="14" y1="26" x2="14" y2="30"/>
        <line x1="2"  y1="14" x2="-2" y2="14"/>
        <line x1="26" y1="14" x2="30" y2="14"/>
      </g>
    </g>
    <text x="258" y="12" font-size="22" font-weight="700" fill="#EF4444" text-anchor="end">31°</text>
    <text x="258" y="38" font-size="14" fill="#22C55E" text-anchor="end">22°</text>
  </g>

  <!-- Tag 5: Fr, leicht bewölkt, 24°/16° (warm: gruen/blau) -->
  <g transform="translate(0,404)">
    <text x="22"  y="22" font-size="22" font-weight="600" fill="#FFFFFF">Fr</text>
    <g transform="translate(100,4)">
      <circle cx="10" cy="10" r="6" fill="#FACC15"/>
      <ellipse cx="20" cy="20" rx="14" ry="8" fill="#9CA3AF"/>
    </g>
    <text x="258" y="12" font-size="22" font-weight="700" fill="#22C55E" text-anchor="end">24°</text>
    <text x="258" y="38" font-size="14" fill="#3B82F6" text-anchor="end">16°</text>
  </g>
</svg>
