<svg xmlns="http://www.w3.org/2000/svg" width="272" height="480" viewBox="0 0 272 480" font-family="Inter, system-ui, sans-serif">
  <rect width="272" height="480" fill="#000000"/>

  <!-- Datum + Uhrzeit -->
  <text x="8"   y="26" font-size="22" font-weight="700" fill="#FF0000">Mo 29.5.</text>
  <text x="264" y="26" font-size="22" font-weight="700" fill="#FF0000" text-anchor="end">21:08</text>
  <rect x="0" y="32" width="272" height="2" fill="#FF0000"/>

  <!-- Aussentemperatur -->
  <g transform="translate(82,46)">
    <circle cx="14" cy="14" r="8" fill="#60A5FA"/>
    <g stroke="#60A5FA" stroke-width="2" stroke-linecap="round">
      <line x1="14" y1="2"  x2="14" y2="-2"/>
      <line x1="14" y1="26" x2="14" y2="30"/>
      <line x1="2"  y1="14" x2="-2" y2="14"/>
      <line x1="26" y1="14" x2="30" y2="14"/>
    </g>
  </g>
  <text x="124" y="72" font-size="22" font-weight="600" fill="#CCCCCC">18.5°C</text>

  <!-- PV -->
  <text x="12"  y="118" font-size="16" fill="#FACC15">PV</text>
  <text x="260" y="120" font-size="22" font-weight="700" fill="#FACC15" text-anchor="end">340 W</text>

  <!-- Verbrauch (>= 50 W -> orange) -->
  <text x="12"  y="164" font-size="16" fill="#FB923C">Verbrauch</text>
  <text x="260" y="166" font-size="22" font-weight="700" fill="#FB923C" text-anchor="end">1200 W</text>

  <!-- Hausakku -->
  <text x="12"  y="216" font-size="16" fill="#22C55E">Hausakku</text>
  <text x="260" y="218" font-size="22" font-weight="700" fill="#22C55E" text-anchor="end">72 %</text>
  <rect x="16" y="236" width="240" height="14" rx="3" fill="#161616"/>
  <rect x="16" y="236" width="173" height="14" rx="3" fill="#22C55E"/>
  <text x="136" y="276" font-size="15" fill="#22C55E" text-anchor="middle">entnimmt 400 W</text>

  <!-- MG4 -->
  <text x="12"  y="324" font-size="16" fill="#06B6D4">MG4</text>
  <text x="260" y="326" font-size="22" font-weight="700" fill="#06B6D4" text-anchor="end">72 %</text>
  <rect x="16" y="344" width="240" height="14" rx="3" fill="#161616"/>
  <rect x="16" y="344" width="173" height="14" rx="3" fill="#06B6D4"/>
  <text x="136" y="384" font-size="15" fill="#3B82F6" text-anchor="middle">lädt 1830 W (27.5°C)</text>

  <!-- Kalender-Footer -->
  <text x="136" y="432" font-size="15" fill="#CCCCCC" text-anchor="middle">morgen: 03.06.</text>
  <text x="136" y="464" font-size="22" font-weight="700" fill="#FACC15" text-anchor="middle">Restmüll</text>
</svg>
