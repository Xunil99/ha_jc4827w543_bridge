<svg xmlns="http://www.w3.org/2000/svg" width="272" height="480" viewBox="0 0 272 480" font-family="Inter, system-ui, sans-serif">
  <rect width="272" height="480" fill="#000000"/>

  <!-- Datum + Uhrzeit -->
  <text x="8"   y="26" font-size="22" font-weight="700" fill="#FF0000">Mo 29.5.</text>
  <text x="264" y="26" font-size="22" font-weight="700" fill="#FF0000" text-anchor="end">21:08</text>
  <rect x="0" y="32" width="272" height="2" fill="#FF0000"/>

  <!-- MG4 Header -->
  <text x="136" y="64" font-size="22" font-weight="700" fill="#06B6D4" text-anchor="middle">MG4</text>

  <!-- SoC ganz gross + Bar -->
  <text x="136" y="138" font-size="42" font-weight="700" fill="#06B6D4" text-anchor="middle">72 %</text>
  <rect x="16" y="156" width="240" height="16" rx="3" fill="#161616"/>
  <rect x="16" y="156" width="173" height="16" rx="3" fill="#06B6D4"/>

  <!-- Kilometerstand -->
  <text x="12"  y="212" font-size="16" fill="#CCCCCC">Kilometer</text>
  <text x="260" y="214" font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="end">42 135 km</text>

