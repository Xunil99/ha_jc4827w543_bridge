# JC4827W543 eBike Cockpit (Base-Variante, ohne LDI)
#
# Mehrseitiges Touch-Display fuer Bosch eBike, Hausenergie und Wetter:
#   Page 1  Bosch eBike Cockpit (Akku, Wartung, Letzte Tour, ...)
#   Page 2  5-Tage-Wetterforecast (Open-Meteo, kein HA-Sensor noetig)
#   Page 3  Hausenergie (PV, Verbrauch, Hausakku, MG4, Kalender)
#   Page 4  MG4-Detail (per Tap auf MG4-Sektion in Page 3)
#
# Navigation:
#   - Wischen links/rechts zwischen Page 1 / 2 / 3
#   - Tap auf MG4-Sektion in Page 3 -> Page 4
#   - Tap irgendwo auf Page 4 -> zurueck zu Page 3
#
# Vor dem Flashen anpassen:
#   - home_latitude / home_longitude auf Heimatkoordinaten
#   - bike_name fuer den Bike-Namen im Header (entfaellt, da Page 1
#     ihn aktuell nicht mehr zeigt - Bike-Name ist nur Substitution)
#   - Alle entity_*-Substitutionen unten auf die jeweiligen HA-Entitaeten
#     im eigenen Setup; nicht vorhandene koennen auf 'sensor.dummy'
#     gesetzt werden, betreffende Felder bleiben dann leer
#   - secrets.yaml mit wifi_ssid und wifi_password im selben Ordner

substitutions:
  device_name: "esphome-web-4e0964"
  friendly_name: "eBike Cockpit"
  bike_name: "Cube Stereo Hybrid"

  # ---- Standort fuer Sonnenstand + Open-Meteo-Wetter ----
  home_latitude: "48.7167"
  home_longitude: "12.4333"

  # ---- Bosch eBike (Page 1) ----
  entity_battery_soc: "sensor.gartenhaus_ebike_battery_soc_live"
  entity_charger_connected: "binary_sensor.gartenhaus_ebike_charger_connected"
  entity_secondary: "sensor.drive_unit_performance_line_cx_last_ride_distance"
  entity_odometer: "sensor.gartenhaus_ebike_odometer_live"
  entity_days_since: "sensor.gartenhaus_ebike_days_since_last_tour"
  entity_maint_count: "sensor.gartenhaus_ebike_due_maintenance_count"
  entity_maint_label: "sensor.gartenhaus_ebike_next_maintenance_label"
  entity_week_distance: "sensor.gartenhaus_ebike_week_distance"

  # ---- Hausenergie (Page 3) ----
  entity_solar_power: "sensor.shelly1pm_3494547656e7_leistung"
  entity_total_power: "sensor.gesamtstrom"
  entity_home_battery_soc: "sensor.lilygo_rs485_marstek_battery_state_of_charge"
  entity_home_battery_power: "sensor.lilygo_rs485_marstek_ac_power"
  entity_calendar: "calendar.awido_online"

  # ---- MG4 (Page 3 + Page 4) ----
  entity_mg4_soc: "sensor.lsjwh4096pn212860_soc"
  entity_mg4_charge_power: "sensor.shelly_mg_steckdose_leistung"
  entity_mg4_socket_temp: "sensor.shellyoutdoorsg3_e4b063f9cb2c_temperatur"
  entity_mg4_speed: "sensor.lsjwh4096pn212860_vehicle_speed"
  entity_mg4_mileage: "sensor.lsjwh4096pn212860_mileage"
  entity_mg4_range: "sensor.lsjwh4096pn212860_range"
  entity_mg4_charging: "binary_sensor.lsjwh4096pn212860_battery_charging"
  entity_mg4_remaining_time: "sensor.lsjwh4096pn212860_remaining_charging_time"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2025.11.0
  on_boot:
    priority: 600
    then:
      - logger.log:
          level: INFO
          format: "eBike Cockpit booting, waiting for HA connection..."
      # Initialer Backlight-Wert direkt am LEDC-Output (vor dem ersten
      # sun.elevation-Update). Tag/Nacht-Umschaltung uebernimmt danach
      # der sun.elevation-Sensor im sensor:-Block.
      - output.set_level:
          id: backlight_pwm
          level: 1.0

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: y
      CONFIG_FREERTOS_HZ: "1000"
      CONFIG_SPIRAM_MODE_OCT: y
      CONFIG_SPIRAM_SPEED_80M: y
      CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG: y
      CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG_ENABLED: y

psram:
  mode: octal
  speed: 80MHz

logger:
  hardware_uart: USB_SERIAL_JTAG
  level: INFO
  logs:
    sensor: WARN

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  on_connect:
    # Sobald WLAN steht, einmal direkt Wetter holen, damit Page 1+2 nicht
    # bis zum naechsten 15-Min-Tick leer aussehen.
    - delay: 3s
    - script.execute: fetch_weather

improv_serial:

api:
  reboot_timeout: 15min

ota:
  - platform: esphome

time:
  - platform: homeassistant
    id: ha_time
  - platform: sntp
    id: sntp_time
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org

# Sonnenauf-/untergang lokal berechnen aus Koordinaten - kein
# HA-Template-Sensor noetig. ESPHome's sun: component nutzt das
# Standard-NOAA-Algorithmus, Genauigkeit besser als 1 Minute.
sun:
  id: home_sun
  latitude: ${home_latitude}
  longitude: ${home_longitude}

i2c:
  - id: bus_a
    sda: GPIO8
    scl: GPIO4
    frequency: 400kHz
    scan: false

spi:
  - id: qspi_bus
    type: quad
    clk_pin: GPIO47
    data_pins:
      - GPIO21
      - GPIO48
      - GPIO40
      - GPIO39

output:
  - platform: ledc
    pin: GPIO1
    id: backlight_pwm
    frequency: 20000Hz

# Bewusst keine light:-Komponente. Backlight wird direkt am LEDC-Output
# gesteuert: on_boot setzt 100%, der sun.elevation-Sensor schaltet
# automatisch zwischen Tag (100%) und Nacht (20%).

display:
  # WICHTIG: mipi_spi statt qspi_dbi. ESPHome 2026.5.x hat qspi_dbi
  # deprecated und der alte Code unterstuetzt keine Hardware-Rotation -
  # LVGL fiel auf Software-Rotation zurueck, was die verwaschene
  # Schrift und IRAM-100%-Auslastung erzeugt hat. mipi_spi macht
  # Hardware-Rotation ueber das MADCTL-Register (0x36) im NV3041A.
  - platform: mipi_spi
    model: CUSTOM
    id: main_display
    spi_id: qspi_bus
    bus_mode: quad
    data_rate: 20MHz
    cs_pin:
      number: GPIO45
      ignore_strapping_warning: true
    dimensions:
      width: 480
      height: 272
    invert_colors: true
    # NV3041A im JC4827W543 erwartet RGB-Kanal-Reihenfolge. mipi_spi
    # default ist bgr - ohne diese Zeile werden R und B vertauscht und
    # man sieht rot als blau, orange als hellblau usw.
    color_order: rgb
    init_sequence:
      - [0xff, 0xa5]
      - [0x36, 0xc0]
      # 0x3A (COLMOD/PIXFMT) wird von mipi_spi automatisch gesetzt und
      # darf nicht in der init_sequence stehen, sonst Config-Error.
      - [0x41, 0x03]
      - [0x44, 0x15]
      - [0x45, 0x15]
      - [0x7d, 0x03]
      - [0xc1, 0xbb]
      - [0xc2, 0x05]
      - [0xc3, 0x10]
      - [0xc6, 0x3e]
      - [0xc7, 0x25]
      - [0xc8, 0x11]
