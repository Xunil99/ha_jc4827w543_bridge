# ---------------------------------------------------------------------------
# Periodische Updates: Wetter, Kalender, Datum/Uhrzeit
# Backlight-Tag/Nacht-Dimming laeuft separat ueber den sun.elevation-
# Sensor (siehe sensor:-Block).
# ---------------------------------------------------------------------------
interval:
  # Wetter alle 15 Min nachladen. Open-Meteo Fair-Use: max 10k Calls/Tag/IP,
  # bei 15 Min sind das 96/Tag, easy unter dem Limit.
  - interval: 15min
    then:
      - script.execute: fetch_weather

  # Stuendlich das Kalender-Label neu auswerten, damit der Wechsel
  # von 'morgen' zu 'heute' an Mitternacht zuverlaessig passiert
  # (die Sensoren cal_message + cal_start aendern sich von alleine
  # nicht zwingend).
  - interval: 1h
    then:
      - script.execute: update_calendar_label

  - interval: 1s
    then:
      - lambda: |-
          // Datum + Uhrzeit auf Page 1 UND Page 3 synchron halten.
          auto t = id(ha_time).now();
          char dbuf[16], tbuf[8];
          if (!t.is_valid()) {
            snprintf(dbuf, sizeof(dbuf), "...");
            snprintf(tbuf, sizeof(tbuf), "--:--");
          } else {
            static const char* days[7] = {"So","Mo","Di","Mi","Do","Fr","Sa"};
            auto ct = t.to_c_tm();
            int wd = ct.tm_wday; if (wd < 0 || wd > 6) wd = 0;
            snprintf(dbuf, sizeof(dbuf), "%s %d.%d.", days[wd], ct.tm_mday, ct.tm_mon + 1);
            strftime(tbuf, sizeof(tbuf), "%H:%M", &ct);
          }
          lv_label_set_text(id(lvgl_date), dbuf);
          lv_label_set_text(id(lvgl_time), tbuf);
          lv_label_set_text(id(lvgl_date_p3), dbuf);
          lv_label_set_text(id(lvgl_time_p3), tbuf);
          lv_label_set_text(id(lvgl_date_p4), dbuf);
          lv_label_set_text(id(lvgl_time_p4), tbuf);
