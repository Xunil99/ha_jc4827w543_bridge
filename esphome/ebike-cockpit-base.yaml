      - [0x5c, 0x02]
      - [0x5d, 0x3c]
      - [0x5e, 0x1f]
      - [0x60, 0x80]
      - [0x61, 0x3f]
      - [0x62, 0x21]
      - [0x63, 0x07]
      - [0x64, 0xe0]
      - [0x65, 0x02]
      - [0xca, 0x20]
      - [0xcb, 0x52]
      - [0xcc, 0x10]
      - [0xcd, 0x42]
      - [0xd0, 0x20]
      - [0xd1, 0x52]
      - [0xd2, 0x10]
      - [0xd3, 0x42]
      - [0xd4, 0x0a]
      - [0xd5, 0x32]
      - [0x80, 0x00]
      - [0xa0, 0x00]
      - [0x81, 0x07]
      - [0xa1, 0x06]
      - [0x82, 0x02]
      - [0xa2, 0x01]
      - [0x86, 0x11]
      - [0xa6, 0x10]
      - [0x87, 0x27]
      - [0xa7, 0x27]
      - [0x83, 0x37]
