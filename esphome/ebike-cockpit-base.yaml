      - [0xae, 0x06]
      - [0x8f, 0x1B]
      - [0xaf, 0x07]
      - [0x90, 0x04]
      - [0xb0, 0x04]
      - [0x91, 0x0a]
      - [0xb1, 0x0a]
      - [0x92, 0x16]
      - [0xb2, 0x15]
      - [0xff, 0x00]
      - [0x11, 0x00]
      - [0x29, 0x00]
    update_interval: never
    auto_clear_enabled: false

touchscreen:
  - platform: gt911
    id: gt911_touch
    display: main_display
    transform:
      mirror_x: true
      mirror_y: false
    interrupt_pin:
      number: GPIO3
      ignore_strapping_warning: true
    reset_pin: GPIO38
    # Swipe-Erkennung: Start-X beim Beruehren festhalten, last-X bei
    # jeder Update-Position aktualisieren, beim Loslassen Delta
    # auswerten und ggf. Page wechseln. Schwelle 50px, damit kleine
    # Wackler keine Seitenwechsel ausloesen.
    on_touch:
      - lambda: |-
          id(touch_start_x) = touch.x;
          id(touch_last_x) = touch.x;
    on_update:
      - lambda: |-
          if (!touches.empty()) {
            id(touch_last_x) = touches[0].x;
          }
    on_release:
      - if:
          condition:
            lambda: 'return (id(touch_last_x) - id(touch_start_x)) < -50;'
          then:
            - lvgl.page.next:
      - if:
          condition:
            lambda: 'return (id(touch_last_x) - id(touch_start_x)) > 50;'
          then:
            - lvgl.page.previous:

font:
  - file: "gfonts://Inter@500"
    id: font_small
    size: 14
  - file: "gfonts://Inter@500"
    id: font_med
    size: 18
    # Default-Glyph-Set ist nur ASCII printable. Wir brauchen deutsche
    # Umlaute fuer Wortlaute wie 'laedt' (ae->ä) und 'entnimmt'.
    glyphs: |-
      !"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\]^_`abcdefghijklmnopqrstuvwxyz{|}~ äöüÄÖÜß°
  - file: "gfonts://Inter@600"
    id: font_big
    size: 28
  - file: "gfonts://Inter@700"
    id: font_huge
    size: 36
  # Material Symbols Outlined fuer Wetter-Icons. Nur die wirklich
  # genutzten Glyphen einbinden, damit das Binary klein bleibt.
  - file: "gfonts://Material+Symbols+Outlined"
    id: font_weather
    size: 28
    glyphs:
      - "\U0000E81A"  # wb_sunny - klarer Tag
      - "\U0000E2BD"  # cloud - bewoelkt
      - "\U0000F176"  # partly_cloudy_day - leicht bewoelkt
      - "\U0000F67F"  # rainy - Regen
      - "\U0000E80F"  # ac_unit - Schnee
      - "\U0000E818"  # foggy - Nebel
      - "\U0000E1FF"  # bolt - Gewitter
      - "\U0000E51C"  # nights_stay - klarer Nachthimmel
      - "\U0000E1C6"  # wb_twilight - Sonnenuntergang
      - "\U0000E88E"  # info - Fallback

globals:
  - id: last_touch_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  # Touch-Tracking fuer Swipe-Detection zwischen den Pages.
  - id: touch_start_x
    type: int16_t
    restore_value: no
    initial_value: "0"
  - id: touch_last_x
    type: int16_t
    restore_value: no
    initial_value: "0"

# ---------------------------------------------------------------------------
# Datenanbindung: HA-Sensoren spiegeln, alle Entitaeten konfigurierbar.
# ---------------------------------------------------------------------------
sensor:
  # Sonnenhoehe fuer automatisches Backlight-Dimming. ESPHome rechnet
  # aus Koordinaten + Uhrzeit. Elevation > 0 = Sonne ueber Horizont = Tag.
  - platform: sun
    sun_id: home_sun
    name: "Sun Elevation"
    type: elevation
    id: sun_elevation
    internal: true
    update_interval: 60s
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x > 0.0f;'
            then:
              - output.set_level:
                  id: backlight_pwm
                  level: 1.0
            else:
              - output.set_level:
                  id: backlight_pwm
                  level: 0.2

  - platform: homeassistant
    id: bike_battery
    entity_id: ${entity_battery_soc}
    on_value:
      then:
        - lvgl.bar.update:
            id: lvgl_battery_bar
            value: !lambda 'return id(bike_battery).state;'
        - lvgl.label.update:
            id: lvgl_battery_pct
            text: !lambda |-
              static char buf[8];
              snprintf(buf, sizeof(buf), "%.0f %%", id(bike_battery).state);
              return buf;

  - platform: homeassistant
    id: bike_secondary
    entity_id: ${entity_secondary}
    on_value:
      then:
        - lvgl.label.update:
            id: lvgl_secondary
            text: !lambda |-
              static char buf[32];
              snprintf(buf, sizeof(buf), "Letzte Tour: %.1f km", id(bike_secondary).state);
              return buf;

  - platform: homeassistant
    id: bike_odometer
    entity_id: ${entity_odometer}
    on_value:
      then:
        - lvgl.label.update:
            id: lvgl_odometer
            text: !lambda |-
              static char buf[24];
              snprintf(buf, sizeof(buf), "%.0f km gesamt", id(bike_odometer).state);
              return buf;

  - platform: homeassistant
    id: bike_days_since
    entity_id: ${entity_days_since}
    on_value:
      then:
        - lvgl.label.update:
            id: lvgl_days_since
            text: !lambda |-
              static char buf[40];
              const int d = (int)id(bike_days_since).state;
              if (d <= 0)      snprintf(buf, sizeof(buf), "Heute schon gefahren");
              else if (d == 1) snprintf(buf, sizeof(buf), "Letzte Fahrt: gestern");
              else             snprintf(buf, sizeof(buf), "Letzte Fahrt: vor %d Tagen", d);
              return buf;

  - platform: homeassistant
    id: bike_maint_count
    entity_id: ${entity_maint_count}
    on_value:
      then:
        - lvgl.label.update:
            id: lvgl_maint_count
            text: !lambda |-
              static char buf[40];
              const int n = (int)id(bike_maint_count).state;
              if (n <= 0)      snprintf(buf, sizeof(buf), "Keine Wartung faellig");
              else if (n == 1) snprintf(buf, sizeof(buf), "1 Wartung faellig");
              else             snprintf(buf, sizeof(buf), "%d Wartungen faellig", n);
              return buf;

  # Wetter (aktuelle Temperatur + 5-Tage-Forecast) kommt jetzt direkt
  # von Open-Meteo, siehe http_request- und interval-Block weiter unten.
  # Kein HA-Sensor mehr noetig.

  # Wochenkilometer im Akkublock unter "Letzte Tour" anzeigen.
  - platform: homeassistant
    id: bike_week_distance
    entity_id: ${entity_week_distance}
    on_value:
      then:
        - lvgl.label.update:
            id: lvgl_week_distance
            text: !lambda |-
              static char buf[32];
              snprintf(buf, sizeof(buf), "Diese Woche: %.0f km", id(bike_week_distance).state);
              return buf;

  # -------- Page 3: Hausenergie -----------------------------------
  - platform: homeassistant
    id: solar_power
    entity_id: ${entity_solar_power}
    on_value:
      then:
        - lvgl.label.update:
            id: lvgl_solar_power
            text: !lambda |-
              static char buf[16];
              snprintf(buf, sizeof(buf), "%.0f W", id(solar_power).state);
              return buf;

  - platform: homeassistant
    id: total_power
    entity_id: ${entity_total_power}
    on_value:
      then:
        - lambda: |-
            float p = id(total_power).state;
            char buf[16];
            snprintf(buf, sizeof(buf), "%.0f W", p);
            lv_label_set_text(id(lvgl_total_power), buf);
            // < 50 W oder negativ (Einspeisung): gruen. >= 50 W: orange.
            lv_color_t col = (p < 50.0f) ? lv_color_hex(0x22C55E) : lv_color_hex(0xFB923C);
            lv_obj_set_style_text_color(id(lvgl_total_power), col, LV_PART_MAIN);
            lv_obj_set_style_text_color(id(lvgl_total_power_label), col, LV_PART_MAIN);

  - platform: homeassistant
    id: home_battery_soc
    entity_id: ${entity_home_battery_soc}
    on_value:
      then:
        - lvgl.bar.update:
            id: lvgl_home_battery_bar
            value: !lambda 'return id(home_battery_soc).state;'
        - lvgl.label.update:
            id: lvgl_home_battery_pct
            text: !lambda |-
              static char buf[8];
              snprintf(buf, sizeof(buf), "%.0f %%", id(home_battery_soc).state);
              return buf;

  - platform: homeassistant
    id: home_battery_power
    entity_id: ${entity_home_battery_power}
    on_value:
      then:
        - lambda: |-
            float p = id(home_battery_power).state;
            char buf[32];
            lv_color_t col;
            if (p > 5.0f) {
              // Positiv = Akku gibt Strom ab
              snprintf(buf, sizeof(buf), "entnimmt %.0f W", p);
              col = lv_color_hex(0x22C55E);
            } else if (p < -5.0f) {
              // Negativ = Akku wird geladen
              snprintf(buf, sizeof(buf), "lädt %.0f W", -p);
              col = lv_color_hex(0x3B82F6);
            } else {
              snprintf(buf, sizeof(buf), "Standby");
              col = lv_color_hex(0x888888);
            }
            lv_label_set_text(id(lvgl_home_battery_power), buf);
            lv_obj_set_style_text_color(id(lvgl_home_battery_power), col, LV_PART_MAIN);

  - platform: homeassistant
    id: mg4_soc
    entity_id: ${entity_mg4_soc}
    on_value:
      then:
        - lambda: |-
            float s = id(mg4_soc).state;
            char pbuf[8];
            snprintf(pbuf, sizeof(pbuf), "%.0f %%", s);
            // Page 3 (Hausenergie)
            lv_label_set_text(id(lvgl_mg4_pct), pbuf);
            lv_bar_set_value(id(lvgl_mg4_bar), (int32_t)s, LV_ANIM_OFF);
            // Page 4 (MG4 Detail)
            lv_label_set_text(id(lvgl_mg4_pct_p4), pbuf);
            lv_bar_set_value(id(lvgl_mg4_bar_p4), (int32_t)s, LV_ANIM_OFF);

  - platform: homeassistant
    id: mg4_charge_power
    entity_id: ${entity_mg4_charge_power}
    on_value:
      then:
        - script.execute: update_mg4_charge_label

  - platform: homeassistant
    id: mg4_socket_temp
    entity_id: ${entity_mg4_socket_temp}
    on_value:
      then:
        - script.execute: update_mg4_charge_label

  - platform: homeassistant
    id: mg4_speed
    entity_id: ${entity_mg4_speed}
    on_value:
      then:
        - script.execute: update_mg4_charge_label

  - platform: homeassistant
    id: mg4_mileage
    entity_id: ${entity_mg4_mileage}
    on_value:
      then:
        - lvgl.label.update:
            id: lvgl_mg4_mileage_p4
            text: !lambda |-
              static char buf[24];
              snprintf(buf, sizeof(buf), "%.0f km", id(mg4_mileage).state);
              return buf;

  - platform: homeassistant
    id: mg4_range
    entity_id: ${entity_mg4_range}
    on_value:
      then:
        - lvgl.label.update:
            id: lvgl_mg4_range_p4
            text: !lambda |-
              static char buf[24];
              snprintf(buf, sizeof(buf), "%.0f km", id(mg4_range).state);
              return buf;

  - platform: homeassistant
    id: mg4_remaining_time
    entity_id: ${entity_mg4_remaining_time}
    on_value:
      then:
        - script.execute: update_mg4_charge_end_label


binary_sensor:
  - platform: homeassistant
    id: bike_charging
    entity_id: ${entity_charger_connected}
    on_state:
      then:
        - lvgl.label.update:
            id: lvgl_charge_icon
            text: !lambda 'return std::string(id(bike_charging).state ? "Laedt" : "");'

  # MG4-Lade-Status fuer Page 4 (Detail-Bildschirm). Triggert das
  # gemeinsame Update-Script, das auch beim Wechsel des Remaining-Time
  # zum Zug kommt.
  - platform: homeassistant
    id: mg4_charging
    entity_id: ${entity_mg4_charging}
    on_state:
      then:
        - script.execute: update_mg4_charge_end_label


text_sensor:
  - platform: homeassistant
    id: bike_maint_next
    entity_id: ${entity_maint_label}
    on_value:
      then:
        - lvgl.label.update:
            id: lvgl_maint_next
            text: !lambda 'return id(bike_maint_next).state.c_str();'

  # Naechster Kalender-Termin (z.B. Restmuell). Zwei Attribute der
  # calendar-Entity einzeln auslesen: 'message' = Titel des Termins,
  # 'start_time' = ISO-Datetime (UTC) des Starts.
  - platform: homeassistant
    id: cal_message
    entity_id: ${entity_calendar}
    attribute: message
    on_value:
      then:
        - script.execute: update_calendar_label
  - platform: homeassistant
    id: cal_start
    entity_id: ${entity_calendar}
    attribute: start_time
    on_value:
      then:
        - script.execute: update_calendar_label

  # Sonnenaufgang + Sonnenuntergang aus dem ESPHome-sun:-Component
  # berechnet. Kein HA-Template-Sensor mehr noetig. Lokale Zeitzone
  # wird automatisch aus der time:-Konfiguration uebernommen.
  - platform: sun
    sun_id: home_sun
    name: "Sun Next Rising"
    type: sunrise
    format: "%H:%M"
    id: esp_sunrise
    on_value:
      then:
        - lvgl.label.update:
            id: lvgl_sunrise
            text: !lambda 'return std::string("Auf ") + x;'
  - platform: sun
    sun_id: home_sun
    name: "Sun Next Setting"
    type: sunset
    format: "%H:%M"
    id: esp_sunset
    on_value:
      then:
        - lvgl.label.update:
            id: lvgl_sunset
            text: !lambda 'return std::string("Ab ") + x;'

  # (Wetter wird via Open-Meteo-HTTP unten geholt, kein HA-Sensor.)

# ---------------------------------------------------------------------------
# Open-Meteo Wetter (aktuelle Temp + Condition + 5-Tage-Forecast)
# Direkt aus Koordinaten, kein API-Key, keine HA-Sensoren noetig.
# ---------------------------------------------------------------------------
http_request:
  id: http_client
  useragent: "esphome-cockpit/1.0"
  verify_ssl: false
  timeout: 10s

script:
  # Aktualisiert das MG4-Status-Label unter dem Bar. Drei Zustaende mit
  # Prioritaet: Geschwindigkeit > 0 schlaegt alles andere (Auto faehrt),
  # sonst Lade-Info falls Steckdose > 10 W, sonst leer.
  - id: update_mg4_charge_label
    then:
      - lambda: |-
          float v = id(mg4_speed).state;
          float p = id(mg4_charge_power).state;
          char buf[48];
          lv_color_t col = lv_color_hex(0x3B82F6);  // Default blau
          if (v > 0.0f) {
            // Auto faehrt
            snprintf(buf, sizeof(buf), "fährt %.0f km/h", v);
            col = lv_color_hex(0xFB923C);  // orange
          } else if (p > 10.0f) {
            // Auto laedt
            float t = id(mg4_socket_temp).state;
            if (!std::isnan(t)) {
              snprintf(buf, sizeof(buf), "lädt %.0f W (%.1f°C)", p, t);
            } else {
              snprintf(buf, sizeof(buf), "lädt %.0f W", p);
            }
            col = lv_color_hex(0x3B82F6);  // blau
          } else {
            buf[0] = '\0';
          }
          lv_label_set_text(id(lvgl_mg4_charge_power), buf);
          lv_obj_set_style_text_color(id(lvgl_mg4_charge_power), col, LV_PART_MAIN);

  # MG4-Ladezeitende fuer Page 4: aus binary_sensor (charging?) und
  # sensor (remaining seconds) den voraussichtlichen Endzeitpunkt bauen.
  - id: update_mg4_charge_end_label
    then:
      - lambda: |-
          bool charging = id(mg4_charging).state;
          float rem_f = id(mg4_remaining_time).state;
          int remaining = std::isnan(rem_f) ? 0 : (int)rem_f;
          char buf[40];
          if (charging && remaining > 0) {
            auto now = id(ha_time).now();
            if (now.is_valid()) {
              time_t end_ts = (time_t)now.timestamp + remaining;
              struct tm *end_tm = localtime(&end_ts);
              if (end_tm != nullptr) {
                strftime(buf, sizeof(buf), "fertig um %H:%M", end_tm);
                lv_label_set_text(id(lvgl_mg4_charge_end_p4), buf);
                return;
              }
            }
            // Fallback ohne gueltige Zeit: Restdauer
            int h = remaining / 3600;
            int m = (remaining % 3600) / 60;
            snprintf(buf, sizeof(buf), "noch %dh %02dmin", h, m);
            lv_label_set_text(id(lvgl_mg4_charge_end_p4), buf);
          } else if (charging) {
            lv_label_set_text(id(lvgl_mg4_charge_end_p4), "lädt");
          } else {
            lv_label_set_text(id(lvgl_mg4_charge_end_p4), "");
          }

  # Naechster Kalender-Termin: 'message' und 'start_time' aus HA holen,
  # ISO-Datum parsen, deutsche Wochentags-/Monatsbezeichnung bauen.
  # Sonderfall: heute -> 'heute: dd.mm.', morgen -> 'morgen: dd.mm.'.
  - id: update_calendar_label
    then:
      - lambda: |-
          const std::string& msg = id(cal_message).state;
          const std::string& start = id(cal_start).state;
          if (msg.empty() || start.empty()) {
            lv_label_set_text(id(lvgl_calendar_date), "");
            lv_label_set_text(id(lvgl_calendar_title), "");
            return;
          }
          // Erwartetes Format: '2026-06-03T07:00:00+00:00' oder '2026-06-03'
          int y = 0, mo = 0, d = 0;
          if (sscanf(start.c_str(), "%d-%d-%d", &y, &mo, &d) != 3) {
            lv_label_set_text(id(lvgl_calendar_date), "");
            lv_label_set_text(id(lvgl_calendar_title), msg.c_str());
            return;
          }
          // Tagesdifferenz zwischen Event und heute berechnen, via mktime
          struct tm event_tm = {};
          event_tm.tm_year = y - 1900;
          event_tm.tm_mon  = mo - 1;
          event_tm.tm_mday = d;
          event_tm.tm_hour = 12;
          time_t event_ts = mktime(&event_tm);
          int wd_evt = event_tm.tm_wday; if (wd_evt < 0 || wd_evt > 6) wd_evt = 0;
          int days_diff = 9999;
          auto now = id(ha_time).now();
          if (now.is_valid()) {
            struct tm today_tm = {};
            today_tm.tm_year = now.year - 1900;
            today_tm.tm_mon  = now.month - 1;
            today_tm.tm_mday = now.day_of_month;
            today_tm.tm_hour = 12;
            time_t today_ts = mktime(&today_tm);
            days_diff = (int)((event_ts - today_ts) / 86400);
          }
          static const char* WDAY_LONG[7] = {
            "Sonntag","Montag","Dienstag","Mittwoch",
            "Donnerstag","Freitag","Samstag"
          };
          static const char* MONTH_LONG[12] = {
            "Januar","Februar","März","April","Mai","Juni",
            "Juli","August","September","Oktober","November","Dezember"
          };
          int mi = mo - 1; if (mi < 0 || mi > 11) mi = 0;
          char dbuf[64];
          if (days_diff == 0) {
            snprintf(dbuf, sizeof(dbuf), "heute: %02d.%02d.", d, mo);
          } else if (days_diff == 1) {
            snprintf(dbuf, sizeof(dbuf), "morgen: %02d.%02d.", d, mo);
          } else {
            snprintf(dbuf, sizeof(dbuf), "%s, %d. %s", WDAY_LONG[wd_evt], d, MONTH_LONG[mi]);
          }
          lv_label_set_text(id(lvgl_calendar_date), dbuf);
          lv_label_set_text(id(lvgl_calendar_title), msg.c_str());

  - id: fetch_weather
    then:
      - http_request.get:
          url: "https://api.open-meteo.com/v1/forecast?latitude=${home_latitude}&longitude=${home_longitude}&current=temperature_2m,weather_code,is_day&daily=weather_code,temperature_2m_max,temperature_2m_min&forecast_days=5&timezone=auto"
          capture_response: true
          on_response:
            then:
              - lambda: |-
                  if (response->status_code != 200) {
                    ESP_LOGW("openmeteo", "HTTP %d", response->status_code);
                    return;
                  }
                  // WMO Weather-Code zu Material-Symbol-Glyph
                  auto code_to_icon = [](int c, bool day) -> std::string {
                    if (c == 0 || c == 1)             return day ? std::string("\xEE\xA0\x9A") : std::string("\xEE\x94\x9C");
                    if (c == 2)                       return std::string("\xEF\x85\xB6");
                    if (c == 3)                       return std::string("\xEE\x8A\xBD");
                    if (c == 45 || c == 48)           return std::string("\xEE\xA0\x98");
                    if (c >= 51 && c <= 67)           return std::string("\xEF\x99\xBF");
                    if (c >= 71 && c <= 77)           return std::string("\xEE\xA0\x8F");
                    if (c >= 80 && c <= 82)           return std::string("\xEF\x99\xBF");
                    if (c == 85 || c == 86)           return std::string("\xEE\xA0\x8F");
                    if (c >= 95)                      return std::string("\xEE\x87\xBF");
                    return std::string("\xEE\xA2\x8E");
                  };
                  ArduinoJson::JsonDocument doc;
                  DeserializationError err = deserializeJson(doc, body);
                  if (err) {
                    ESP_LOGW("openmeteo", "JSON parse: %s", err.c_str());
                    return;
                  }
                  // Aktuelle Werte (Page 1 + Page 3)
                  float cur_temp = doc["current"]["temperature_2m"].as<float>();
                  int   cur_code = doc["current"]["weather_code"].as<int>();
                  bool  is_day   = doc["current"]["is_day"].as<int>() != 0;
                  char tbuf[12];
                  snprintf(tbuf, sizeof(tbuf), "%.1f°C", cur_temp);
                  std::string icon_str = code_to_icon(cur_code, is_day);
                  lv_label_set_text(id(lvgl_weather_temp), tbuf);
                  lv_label_set_text(id(lvgl_weather_icon), icon_str.c_str());
                  // Aussentemperatur auch auf Page 3 (Hausenergie)
                  lv_label_set_text(id(lvgl_outdoor_temp_p3), tbuf);
                  lv_label_set_text(id(lvgl_outdoor_icon_p3), icon_str.c_str());
                  // 5-Tage-Forecast (Page 2)
                  static const char* WDAY_DE[7] = {"So","Mo","Di","Mi","Do","Fr","Sa"};
                  auto now = id(ha_time).now();
                  int base_wd = now.is_valid() ? now.day_of_week - 1 : 0;
                  auto codes = doc["daily"]["weather_code"];
                  auto maxes = doc["daily"]["temperature_2m_max"];
                  auto mins  = doc["daily"]["temperature_2m_min"];
                  lv_obj_t* name_labels[5] = {id(fc_day0_name), id(fc_day1_name), id(fc_day2_name), id(fc_day3_name), id(fc_day4_name)};
                  lv_obj_t* icon_labels[5] = {id(fc_day0_icon), id(fc_day1_icon), id(fc_day2_icon), id(fc_day3_icon), id(fc_day4_icon)};
                  lv_obj_t* max_labels[5]  = {id(fc_day0_max),  id(fc_day1_max),  id(fc_day2_max),  id(fc_day3_max),  id(fc_day4_max)};
                  lv_obj_t* min_labels[5]  = {id(fc_day0_min),  id(fc_day1_min),  id(fc_day2_min),  id(fc_day3_min),  id(fc_day4_min)};
                  // Temperatur-Farbgebung in drei Stufen:
                  //  >= 30 Grad: rot
                  //  >= 20 Grad: gruen
                  //  <  20 Grad: blau
                  auto temp_color = [](float t) -> lv_color_t {
                    if (t >= 30.0f) return lv_color_hex(0xEF4444);  // rot
                    if (t >= 20.0f) return lv_color_hex(0x22C55E);  // gruen
                    return lv_color_hex(0x3B82F6);                  // blau
                  };
                  for (int i = 0; i < 5; i++) {
                    int   dc = codes[i].as<int>();
                    float dmax = maxes[i].as<float>();
                    float dmin = mins[i].as<float>();
                    char mxbuf[8], mnbuf[8];
                    snprintf(mxbuf, sizeof(mxbuf), "%.0f°", dmax);
                    snprintf(mnbuf, sizeof(mnbuf), "%.0f°", dmin);
                    lv_label_set_text(name_labels[i], WDAY_DE[(base_wd + i) % 7]);
                    lv_label_set_text(icon_labels[i], code_to_icon(dc, true).c_str());
                    lv_label_set_text(max_labels[i],  mxbuf);
                    lv_label_set_text(min_labels[i],  mnbuf);
                    lv_obj_set_style_text_color(max_labels[i], temp_color(dmax), LV_PART_MAIN);
                    lv_obj_set_style_text_color(min_labels[i], temp_color(dmin), LV_PART_MAIN);
                  }
                  ESP_LOGI("openmeteo", "Weather updated: %.1f°C code=%d", cur_temp, cur_code);

# ---------------------------------------------------------------------------
# LVGL UI - Layout aus dem Working-YAML uebernommen (obj-Container mit
# bg_opa: COVER pro Sektion). Statt 6 Slots haben wir hier 7 fest
# zugeordnete eBike-Datenpunkte in vertikalem Stack.
# ---------------------------------------------------------------------------
lvgl:
  rotation: 270
  displays:
    - main_display
  touchscreens:
    - gt911_touch
  on_idle:
    timeout: 1s
    then:
      - lambda: 'id(last_touch_ms) = millis();'

  pages:
    - id: page_main
      bg_color: 0x000000
      widgets:
        # ---------- Top: Datum links + Uhrzeit rechts in ROT ------------
        - obj:
            x: 0
            y: 0
            width: 272
            height: 32
            bg_color: 0x000000
            bg_opa: COVER
            border_width: 0
            pad_all: 0
            scrollbar_mode: "off"
            scrollable: false
            widgets:
              - label:
                  id: lvgl_date
                  x: 8
                  y: 2
                  width: 130
                  text_align: LEFT
                  text_color: 0xFF0000
                  text_font: font_big
                  text: "..."
              - label:
                  id: lvgl_time
                  x: 134
                  y: 2
                  width: 130
                  text_align: RIGHT
                  text_color: 0xFF0000
                  text_font: font_big
                  text: "--:--"

        # ---------- Duenne rote Linie ----------------------------------
