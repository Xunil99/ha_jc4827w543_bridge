# JC4827W543 eBike Cockpit (Base-Variante, ohne LDI)
#
# Das Display zeigt sieben Kerninformationen zu einem Bosch eBike, die es
# rein aus Home-Assistant-Sensoren bezieht. Wenn HA offline ist, frieren die
# Werte ein. Fuer Online-Bezug ohne HA: siehe ebike-cockpit-with-ldi.yaml.
#
# Vor dem Flashen anpassen:
#  - Substitution `bike` (Entity-Praefix in HA, z.B. "performance_cx")
#  - Substitution `bike_name` (was im Header angezeigt wird)
#  - secrets.yaml mit wifi_ssid + wifi_password
#  - Optional: Helligkeit, Sleep-Zeiten

substitutions:
  device_name: "esphome-web-4e0964"
  friendly_name: "eBike Cockpit"
  bike_name: "Cube Stereo Hybrid"

  # Jede Entitaet einzeln konfigurierbar. Setze fehlende Sensoren auf
  # eine nicht existierende Entitaet (z.B. "sensor.dummy"), dann bleibt
  # der jeweilige Anzeige-Block leer auf "--".
  entity_battery_soc: "sensor.gartenhaus_ebike_battery_soc_live"
  entity_charger_connected: "binary_sensor.gartenhaus_ebike_charger_connected"
  # Anstelle der nicht existenten Reichweite zeigen wir die letzte Tour.
  # Alternativ: charge_power_live, battery_health, charging_state.
  entity_secondary: "sensor.drive_unit_performance_line_cx_last_ride_distance"
  entity_odometer: "sensor.gartenhaus_ebike_odometer_live"
  entity_days_since: "sensor.gartenhaus_ebike_days_since_last_tour"
  entity_maint_count: "sensor.gartenhaus_ebike_due_maintenance_count"
  entity_maint_label: "sensor.gartenhaus_ebike_next_maintenance_label"

  # Helligkeit (0..100). Wird per Time-Schedule weiter gedimmt nachts.
  brightness_day: "85"
  brightness_night: "10"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2025.4.0

esp32:
  board: esp32-s3-devkitc-1
  variant: ESP32S3
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_SPIRAM_RODATA: "y"

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO
  hardware_uart: USB_SERIAL_JTAG

api:
#  encryption:
#    key: !secret api_encryption_key
ota:
  - platform: esphome
#    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_name} Fallback"

time:
  - platform: homeassistant
    id: ha_time
    timezone: "Europe/Berlin"

# ---------------------------------------------------------------------------
# Datenanbindung: HA-Sensoren spiegeln, alle Entitaeten konfigurierbar.
# ---------------------------------------------------------------------------
sensor:
  - platform: homeassistant
    id: bike_battery
    entity_id: ${entity_battery_soc}
    on_value:
      then:
        - lvgl.bar.update:
            id: lvgl_battery_bar
            value: !lambda 'return id(bike_battery).state;'
        - lvgl.label.update:
            id: lvgl_battery_pct
            text: !lambda |-
              static char buf[8];
              snprintf(buf, sizeof(buf), "%.0f %%", id(bike_battery).state);
              return buf;

  # Sekundaer-Info anstelle der nicht existenten Reichweite.
  # Default: Letzte Tour Distanz. Bei Bedarf entity_secondary umbiegen.
  - platform: homeassistant
    id: bike_secondary
    entity_id: ${entity_secondary}
    on_value:
      then:
        - lvgl.label.update:
            id: lvgl_range_label
            text: !lambda |-
              static char buf[32];
              snprintf(buf, sizeof(buf), "Letzte Tour: %.1f km", id(bike_secondary).state);
              return buf;

  - platform: homeassistant
    id: bike_odometer
    entity_id: ${entity_odometer}
    on_value:
      then:
        - lvgl.label.update:
            id: lvgl_odometer
            text: !lambda |-
              static char buf[24];
              snprintf(buf, sizeof(buf), "%.0f km gesamt", id(bike_odometer).state);
              return buf;

  - platform: homeassistant
    id: bike_days_since
    # HA-Template-Sensor, siehe README. Liefert int "Tage seit letzter Fahrt".
    entity_id: ${entity_days_since}
    on_value:
      then:
        - lvgl.label.update:
            id: lvgl_days_since
            text: !lambda |-
              static char buf[40];
              const int d = (int)id(bike_days_since).state;
              if (d <= 0)      snprintf(buf, sizeof(buf), "Heute schon gefahren");
              else if (d == 1) snprintf(buf, sizeof(buf), "Letzte Fahrt: gestern");
              else             snprintf(buf, sizeof(buf), "Letzte Fahrt: vor %d Tagen", d);
              return buf;

  - platform: homeassistant
    id: bike_maint_count
    entity_id: ${entity_maint_count}
    on_value:
      then:
        - lvgl.label.update:
            id: lvgl_maint_count
            text: !lambda |-
              static char buf[40];
              const int n = (int)id(bike_maint_count).state;
              if (n <= 0)      snprintf(buf, sizeof(buf), "Keine Wartung faellig");
              else if (n == 1) snprintf(buf, sizeof(buf), "1 Wartung faellig");
              else             snprintf(buf, sizeof(buf), "%d Wartungen faellig", n);
              return buf;

binary_sensor:
  - platform: homeassistant
    id: bike_charging
    entity_id: ${entity_charger_connected}
    on_state:
      then:
        - lvgl.label.update:
            id: lvgl_charge_icon
            text: !lambda 'return std::string(id(bike_charging).state ? "⚡" : "");'

text_sensor:
  - platform: homeassistant
    id: bike_maint_next
    entity_id: ${entity_maint_label}
    on_value:
      then:
        - lvgl.label.update:
            id: lvgl_maint_next
            text: !lambda 'return id(bike_maint_next).state.c_str();'

# Datum + Uhrzeit aus dem Zeit-Component aktualisieren wir periodisch.
interval:
  - interval: 1s
    then:
      - lvgl.label.update:
          id: lvgl_time
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("--:--");
            char buf[8];
            snprintf(buf, sizeof(buf), "%02d:%02d", t.hour, t.minute);
            return std::string(buf);
      - lvgl.label.update:
          id: lvgl_date
          text: !lambda |-
            static const char* WDAY_DE[7] = {"So", "Mo", "Di", "Mi", "Do", "Fr", "Sa"};
            static const char* MON_DE[12] = {
              "Jan", "Feb", "Mar", "Apr", "Mai", "Jun",
              "Jul", "Aug", "Sep", "Okt", "Nov", "Dez"
            };
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("");
            char buf[40];
            snprintf(buf, sizeof(buf), "%s, %d. %s %d",
              WDAY_DE[t.day_of_week - 1], t.day_of_month,
              MON_DE[t.month - 1], t.year);
            return std::string(buf);

# Nachts dimmen (22:00 bis 06:30)
  - interval: 60s
    then:
      - lambda: |-
          auto t = id(ha_time).now();
          if (!t.is_valid()) return;
          bool night = (t.hour >= 22) || (t.hour < 6) || (t.hour == 6 && t.minute < 30);
          auto target = night ? ${brightness_night} : ${brightness_day};
          // Backlight wird per LEDC gesteuert (siehe output: weiter unten).
          id(backlight).turn_on().set_brightness(target / 100.0f).perform();

# ---------------------------------------------------------------------------
# Display-Hardware JC4827W543 (NV3041A QSPI, 480x272). LVGL rotiert auf
# 272x480 (Hochformat).
# ---------------------------------------------------------------------------
output:
  - platform: ledc
    id: backlight_pwm
    pin: GPIO1
    frequency: 20000Hz

light:
  - platform: monochromatic
    id: backlight
    name: "Backlight"
    output: backlight_pwm
    restore_mode: ALWAYS_ON
    default_transition_length: 0s

spi:
  - id: qspi_bus
    type: quad
    clk_pin: GPIO47
    data_pins: [GPIO21, GPIO48, GPIO40, GPIO39]

display:
  - platform: qspi_dbi
    id: lcd
    spi_id: qspi_bus
    model: CUSTOM
    data_rate: 20MHz
    # ESPHome darf den Display-Buffer nicht zwischen LVGL-Frames
    # "loeschen", sonst flackert es. LVGL uebernimmt das.
    auto_clear_enabled: false
    update_interval: never
    invert_colors: true
    cs_pin:
      number: GPIO45
      ignore_strapping_warning: true
    dimensions:
      width: 480
      height: 272
    # VOLLSTAENDIGE NV3041A-Init-Sequenz aus der offiziellen
    # ESPHome-Geraete-Referenz:
    # https://devices.esphome.io/devices/guition-jc4827543c/
    # Die kurze 19-Register-Variante hatte Gamma- und Timing-Drift,
    # was sich als Streifen, Flackern und unscharfer Schrift gezeigt
    # hat. Diese 90+-Register-Variante setzt alle Voltage-, Gamma-
    # und Timing-Register sauber.
    init_sequence:
      - [0xff, 0xa5]
      - [0x36, 0xc0]
      - [0x3A, 0x01]
      - [0x41, 0x03]
      - [0x44, 0x15]
