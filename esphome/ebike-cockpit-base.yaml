              - label:
                  id: lvgl_bike_name
                  x: 0
                  y: 0
                  width: 272
                  text_align: CENTER
                  text_color: 0x22C55E
                  text_font: font_med
                  text: "${bike_name}"

        # ---------- Akku: Prozent gross, Bar, Sekundaer-Info ---------
