# JC4827W543 eBike Cockpit (Base-Variante, ohne LDI)
#
# Strikt abgeleitet vom verifizierten 6-Slot-Working-YAML.
# Geaendert ggue. Original: pages: zeigen jetzt 7 statische Bosch-eBike
# Datenpunkte statt 6 generischer Slots; api: services rausgenommen
# (kein set_slot-RPC mehr noetig); HA-Sensor-Sources zugefuegt.

substitutions:
  device_name: "esphome-web-4e0964"
  friendly_name: "eBike Cockpit"
  bike_name: "Cube Stereo Hybrid"

  entity_battery_soc: "sensor.gartenhaus_ebike_battery_soc_live"
  entity_charger_connected: "binary_sensor.gartenhaus_ebike_charger_connected"
  entity_secondary: "sensor.drive_unit_performance_line_cx_last_ride_distance"
  entity_odometer: "sensor.gartenhaus_ebike_odometer_live"
  entity_days_since: "sensor.gartenhaus_ebike_days_since_last_tour"
  entity_maint_count: "sensor.gartenhaus_ebike_due_maintenance_count"
  entity_maint_label: "sensor.gartenhaus_ebike_next_maintenance_label"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2025.11.0
  on_boot:
    priority: -100
    then:
      - logger.log:
          level: WARN
          format: "=== EBIKE COCKPIT BUILD MARKER v0.2 LOADED ==="
      - light.turn_on:
          id: backlight
          brightness: 100%

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: y
      CONFIG_FREERTOS_HZ: "1000"
      CONFIG_SPIRAM_MODE_OCT: y
      CONFIG_SPIRAM_SPEED_80M: y
      CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG: y
      CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG_ENABLED: y

psram:
  mode: octal
  speed: 80MHz

logger:
  hardware_uart: USB_SERIAL_JTAG
  level: INFO
  logs:
    sensor: WARN

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true

improv_serial:

api:
  reboot_timeout: 15min

ota:
  - platform: esphome

time:
  - platform: homeassistant
    id: ha_time
  - platform: sntp
    id: sntp_time
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org

i2c:
  - id: bus_a
    sda: GPIO8
    scl: GPIO4
    frequency: 400kHz
    scan: false

spi:
  - id: qspi_bus
    type: quad
    clk_pin: GPIO47
    data_pins:
      - GPIO21
      - GPIO48
      - GPIO40
      - GPIO39

output:
  - platform: ledc
    pin: GPIO1
    id: backlight_pwm
    frequency: 20000Hz

light:
  - platform: monochromatic
    output: backlight_pwm
    id: backlight
    name: "Display Backlight"
    restore_mode: ALWAYS_ON
    default_transition_length: 250ms

display:
  - platform: qspi_dbi
    model: CUSTOM
    id: main_display
    spi_id: qspi_bus
    data_rate: 20MHz
    cs_pin:
      number: GPIO45
      ignore_strapping_warning: true
    dimensions:
      width: 480
      height: 272
    invert_colors: true
