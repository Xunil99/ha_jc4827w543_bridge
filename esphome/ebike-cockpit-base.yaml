touchscreen:
  - platform: gt911
    id: ts_main
    display: lcd
    i2c_id: i2c_bus
    interrupt_pin:
      number: GPIO3
      ignore_strapping_warning: true
    reset_pin: GPIO38

i2c:
  - id: i2c_bus
    sda: GPIO8
    scl: GPIO4
    frequency: 400kHz
    scan: false

# ---------------------------------------------------------------------------
# LVGL UI
# ---------------------------------------------------------------------------
lvgl:
  # Kein buffer_size hier - Default (volle Frame-Groesse) verhindert
  # die "gestrichelte" Schrift, die durch partial-buffer Streifen-
  # Rendering entstand. Wir haben PSRAM, also kein Speicher-Problem.
  # Kein color_depth: 16 - der Display-Driver legt das Format selbst
  # fest, doppelte Konfiguration kann fehlerhaftes Pixel-Routing geben.
  bg_color: 0x000000
  text_font: montserrat_20
  default_font: montserrat_20
  align: top_mid
  displays:
    - lcd
  rotation: 270

  pages:
    - id: page_main
      bg_color: 0x000000
      # bg_opa: COVER ueberblendet das LVGL-Default-Theme-Checkerboard,
      # sonst scheint ein schwarz-weiss gestricheltes Muster durch.
      bg_opa: COVER
      widgets:
        # 1) Bike-Name (Header)
        - label:
            id: lvgl_bike_name
            text: "${bike_name}"
            text_color: 0xFFB347
            text_font: montserrat_18
            align: top_mid
            y: 6

        # 2) Datum
        - label:
            id: lvgl_date
            text: "----"
            text_color: 0xCCCCCC
            text_font: montserrat_20
            align: top_mid
            y: 34

        # 3) Uhrzeit (sehr gross)
        - label:
            id: lvgl_time
            text: "--:--"
            text_color: 0xFFFFFF
            text_font: montserrat_48
            align: top_mid
            y: 72

        # 4) Akkustand: Prozent gross + Ladesymbol
        - label:
            id: lvgl_battery_pct
            text: "-- %"
            text_color: 0x4ADE80
            text_font: montserrat_40
            align: top_mid
            y: 180
        - label:
            id: lvgl_charge_icon
            text: ""
            text_color: 0xFACC15
            text_font: montserrat_28
            align: top_left
            x: 24
            y: 188
        - bar:
            id: lvgl_battery_bar
            x: 32
            y: 232
            width: 208
            height: 14
            min_value: 0
            max_value: 100
            value: 0
        - label:
            id: lvgl_range_label
            text: ""
            text_color: 0xAAAAAA
            text_font: montserrat_18
            align: top_mid
            y: 252

        # 5) Tage seit letzter Fahrt
        - label:
            id: lvgl_days_since
            text: ""
            text_color: 0xFFFFFF
            text_font: montserrat_20
            align: top_mid
            y: 286

        # 6) Wartung
        - label:
            id: lvgl_maint_count
            text: ""
            text_color: 0xFB923C
            text_font: montserrat_22
            align: top_mid
            y: 322
        - label:
            id: lvgl_maint_next
            text: ""
            text_color: 0xAAAAAA
            text_font: montserrat_16
            align: top_mid
            y: 354

        # 7) Kilometerstand
        - label:
            id: lvgl_odometer
            text: "-- km gesamt"
            text_color: 0x888888
            text_font: montserrat_18
            align: bottom_mid
            y: -10
