# JC4827W543 eBike Cockpit (Base-Variante, ohne LDI)
#
# Strikt abgeleitet vom verifizierten 6-Slot-Working-YAML.
# Geaendert ggue. Original: pages: zeigen jetzt 7 statische Bosch-eBike
# Datenpunkte statt 6 generischer Slots; api: services rausgenommen
# (kein set_slot-RPC mehr noetig); HA-Sensor-Sources zugefuegt.

substitutions:
  device_name: "esphome-web-4e0964"
  friendly_name: "eBike Cockpit"
  bike_name: "Cube Stereo Hybrid"

  entity_battery_soc: "sensor.gartenhaus_ebike_battery_soc_live"
  entity_charger_connected: "binary_sensor.gartenhaus_ebike_charger_connected"
  entity_secondary: "sensor.drive_unit_performance_line_cx_last_ride_distance"
  entity_odometer: "sensor.gartenhaus_ebike_odometer_live"
  entity_days_since: "sensor.gartenhaus_ebike_days_since_last_tour"
  entity_maint_count: "sensor.gartenhaus_ebike_due_maintenance_count"
  entity_maint_label: "sensor.gartenhaus_ebike_next_maintenance_label"
  # Koordinaten fuer Sonnenstand UND Open-Meteo-Wetter direkt am Display.
  # Kein HA-Sensor mehr noetig fuer Wetter. Aktuell Mengkofen, Niederbayern.
  home_latitude: "48.7167"
  home_longitude: "12.4333"
  # Wochenkilometer (laufende Woche). HA-Template-Sensor noetig.
  entity_week_distance: "sensor.gartenhaus_ebike_week_distance"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2025.11.0
  on_boot:
    priority: 600
    then:
      - logger.log:
          level: INFO
          format: "eBike Cockpit booting, waiting for HA connection..."
      # Backlight direkt am PWM-Output auf 100% setzen. Bypassed
      # die Light-Komponente, die mit restore_mode-Quirks den
      # Wert aus dem NVS holt.
      - output.set_level:
          id: backlight_pwm
          level: 1.0

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: y
      CONFIG_FREERTOS_HZ: "1000"
      CONFIG_SPIRAM_MODE_OCT: y
      CONFIG_SPIRAM_SPEED_80M: y
      CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG: y
      CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG_ENABLED: y

psram:
  mode: octal
  speed: 80MHz

logger:
  hardware_uart: USB_SERIAL_JTAG
  level: INFO
  logs:
    sensor: WARN

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  on_connect:
    # Sobald WLAN steht, einmal direkt Wetter holen, damit Page 1+2 nicht
    # bis zum naechsten 15-Min-Tick leer aussehen.
    - delay: 3s
    - script.execute: fetch_weather

improv_serial:

api:
  reboot_timeout: 15min

ota:
  - platform: esphome

time:
  - platform: homeassistant
    id: ha_time
  - platform: sntp
    id: sntp_time
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org

# Sonnenauf-/untergang lokal berechnen aus Koordinaten - kein
# HA-Template-Sensor noetig. ESPHome's sun: component nutzt das
# Standard-NOAA-Algorithmus, Genauigkeit besser als 1 Minute.
sun:
  id: home_sun
  latitude: ${home_latitude}
  longitude: ${home_longitude}

i2c:
  - id: bus_a
    sda: GPIO8
    scl: GPIO4
    frequency: 400kHz
    scan: false

spi:
  - id: qspi_bus
    type: quad
    clk_pin: GPIO47
    data_pins:
      - GPIO21
      - GPIO48
      - GPIO40
      - GPIO39

output:
  - platform: ledc
    pin: GPIO1
    id: backlight_pwm
    frequency: 20000Hz

# Light-Komponente waehrend der Display-Diagnose deaktiviert.
# Wir steuern das Backlight direkt ueber output.set_level in on_boot,
# ohne den Light-State-Layer dazwischen. So kann uns kein NVS-Restore
# oder default_transition reinpfuschen. Wieder einbauen, sobald die
# Diagnose abgeschlossen und das Display sauber ist.
# light:
#   - platform: monochromatic
#     output: backlight_pwm
#     id: backlight
#     name: "Display Backlight"
#     restore_mode: ALWAYS_ON
#     default_transition_length: 250ms

display:
  # WICHTIG: mipi_spi statt qspi_dbi. ESPHome 2026.5.x hat qspi_dbi
  # deprecated und der alte Code unterstuetzt keine Hardware-Rotation -
  # LVGL fiel auf Software-Rotation zurueck, was die verwaschene
  # Schrift und IRAM-100%-Auslastung erzeugt hat. mipi_spi macht
  # Hardware-Rotation ueber das MADCTL-Register (0x36) im NV3041A.
  - platform: mipi_spi
    model: CUSTOM
    id: main_display
    spi_id: qspi_bus
    bus_mode: quad
    data_rate: 20MHz
    cs_pin:
      number: GPIO45
      ignore_strapping_warning: true
    dimensions:
      width: 480
      height: 272
    invert_colors: true
    # NV3041A im JC4827W543 erwartet RGB-Kanal-Reihenfolge. mipi_spi
    # default ist bgr - ohne diese Zeile werden R und B vertauscht und
    # man sieht rot als blau, orange als hellblau usw.
    color_order: rgb
    init_sequence:
      - [0xff, 0xa5]
      - [0x36, 0xc0]
      # 0x3A (COLMOD/PIXFMT) wird von mipi_spi automatisch gesetzt und
      # darf nicht in der init_sequence stehen, sonst Config-Error.
      - [0x41, 0x03]
      - [0x44, 0x15]
      - [0x45, 0x15]
      - [0x7d, 0x03]
      - [0xc1, 0xbb]
      - [0xc2, 0x05]
      - [0xc3, 0x10]
      - [0xc6, 0x3e]
      - [0xc7, 0x25]
      - [0xc8, 0x11]
      - [0x7a, 0x5f]
      - [0x6f, 0x44]
      - [0x78, 0x70]
      - [0xc9, 0x00]
      - [0x67, 0x21]
      - [0x51, 0x0a]
      - [0x52, 0x76]
      - [0x53, 0x0a]
      - [0x54, 0x76]
      - [0x46, 0x0a]
      - [0x47, 0x2a]
      - [0x48, 0x0a]
      - [0x49, 0x1a]
      - [0x56, 0x43]
      - [0x57, 0x42]
      - [0x58, 0x3c]
      - [0x59, 0x64]
      - [0x5a, 0x41]
      - [0x5b, 0x3c]
      - [0x5c, 0x02]
      - [0x5d, 0x3c]
      - [0x5e, 0x1f]
      - [0x60, 0x80]
      - [0x61, 0x3f]
      - [0x62, 0x21]
      - [0x63, 0x07]
      - [0x64, 0xe0]
      - [0x65, 0x02]
      - [0xca, 0x20]
      - [0xcb, 0x52]
      - [0xcc, 0x10]
      - [0xcd, 0x42]
      - [0xd0, 0x20]
      - [0xd1, 0x52]
      - [0xd2, 0x10]
      - [0xd3, 0x42]
      - [0xd4, 0x0a]
      - [0xd5, 0x32]
      - [0x80, 0x00]
      - [0xa0, 0x00]
      - [0x81, 0x07]
      - [0xa1, 0x06]
      - [0x82, 0x02]
      - [0xa2, 0x01]
      - [0x86, 0x11]
      - [0xa6, 0x10]
      - [0x87, 0x27]
      - [0xa7, 0x27]
      - [0x83, 0x37]
      - [0xa3, 0x37]
      - [0x84, 0x35]
      - [0xa4, 0x35]
      - [0x85, 0x3f]
      - [0xa5, 0x3f]
      - [0x88, 0x0b]
      - [0xa8, 0x0b]
      - [0x89, 0x14]
      - [0xa9, 0x14]
      - [0x8a, 0x1a]
      - [0xaa, 0x1a]
      - [0x8b, 0x0a]
      - [0xab, 0x0a]
      - [0x8c, 0x14]
      - [0xac, 0x08]
      - [0x8d, 0x17]
      - [0xad, 0x07]
      - [0x8e, 0x16]
      - [0xae, 0x06]
      - [0x8f, 0x1B]
      - [0xaf, 0x07]
      - [0x90, 0x04]
      - [0xb0, 0x04]
      - [0x91, 0x0a]
      - [0xb1, 0x0a]
      - [0x92, 0x16]
      - [0xb2, 0x15]
      - [0xff, 0x00]
      - [0x11, 0x00]
      - [0x29, 0x00]
    update_interval: never
    auto_clear_enabled: false

touchscreen:
  - platform: gt911
    id: gt911_touch
    display: main_display
    transform:
      mirror_x: true
      mirror_y: false
    interrupt_pin:
      number: GPIO3
      ignore_strapping_warning: true
    reset_pin: GPIO38
    # Swipe-Erkennung: Start-X beim Beruehren festhalten, last-X bei
    # jeder Update-Position aktualisieren, beim Loslassen Delta
    # auswerten und ggf. Page wechseln. Schwelle 50px, damit kleine
    # Wackler keine Seitenwechsel ausloesen.
    on_touch:
      - lambda: |-
          id(touch_start_x) = touch.x;
          id(touch_last_x) = touch.x;
    on_update:
      - lambda: |-
          if (!touches.empty()) {
            id(touch_last_x) = touches[0].x;
          }
    on_release:
      - if:
          condition:
            lambda: 'return (id(touch_last_x) - id(touch_start_x)) < -50;'
          then:
            - lvgl.page.next:
      - if:
          condition:
            lambda: 'return (id(touch_last_x) - id(touch_start_x)) > 50;'
          then:
            - lvgl.page.previous:

font:
  - file: "gfonts://Inter@500"
    id: font_small
    size: 14
  - file: "gfonts://Inter@500"
    id: font_med
    size: 18
  - file: "gfonts://Inter@600"
    id: font_big
    size: 28
  - file: "gfonts://Inter@700"
    id: font_huge
    size: 36
  # Material Symbols Outlined fuer Wetter-Icons. Nur die wirklich
  # genutzten Glyphen einbinden, damit das Binary klein bleibt.
  - file: "gfonts://Material+Symbols+Outlined"
    id: font_weather
    size: 28
    glyphs:
      - "\U0000E81A"  # wb_sunny - klarer Tag
      - "\U0000E2BD"  # cloud - bewoelkt
      - "\U0000F176"  # partly_cloudy_day - leicht bewoelkt
      - "\U0000F67F"  # rainy - Regen
      - "\U0000E80F"  # ac_unit - Schnee
      - "\U0000E818"  # foggy - Nebel
      - "\U0000E1FF"  # bolt - Gewitter
      - "\U0000E51C"  # nights_stay - klarer Nachthimmel
      - "\U0000E1C6"  # wb_twilight - Sonnenuntergang
      - "\U0000E88E"  # info - Fallback

globals:
  - id: last_touch_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  # Touch-Tracking fuer Swipe-Detection zwischen den Pages.
  - id: touch_start_x
    type: int16_t
    restore_value: no
    initial_value: "0"
  - id: touch_last_x
    type: int16_t
    restore_value: no
    initial_value: "0"

# ---------------------------------------------------------------------------
# Datenanbindung: HA-Sensoren spiegeln, alle Entitaeten konfigurierbar.
# ---------------------------------------------------------------------------
sensor:
  - platform: homeassistant
    id: bike_battery
    entity_id: ${entity_battery_soc}
    on_value:
      then:
        - lvgl.bar.update:
            id: lvgl_battery_bar
            value: !lambda 'return id(bike_battery).state;'
        - lvgl.label.update:
            id: lvgl_battery_pct
            text: !lambda |-
              static char buf[8];
              snprintf(buf, sizeof(buf), "%.0f %%", id(bike_battery).state);
              return buf;

  - platform: homeassistant
    id: bike_secondary
    entity_id: ${entity_secondary}
    on_value:
      then:
        - lvgl.label.update:
            id: lvgl_secondary
            text: !lambda |-
              static char buf[32];
              snprintf(buf, sizeof(buf), "Letzte Tour: %.1f km", id(bike_secondary).state);
              return buf;

  - platform: homeassistant
    id: bike_odometer
    entity_id: ${entity_odometer}
    on_value:
      then:
        - lvgl.label.update:
            id: lvgl_odometer
            text: !lambda |-
              static char buf[24];
              snprintf(buf, sizeof(buf), "%.0f km gesamt", id(bike_odometer).state);
              return buf;

  - platform: homeassistant
    id: bike_days_since
    entity_id: ${entity_days_since}
    on_value:
      then:
        - lvgl.label.update:
            id: lvgl_days_since
            text: !lambda |-
              static char buf[40];
              const int d = (int)id(bike_days_since).state;
              if (d <= 0)      snprintf(buf, sizeof(buf), "Heute schon gefahren");
              else if (d == 1) snprintf(buf, sizeof(buf), "Letzte Fahrt: gestern");
              else             snprintf(buf, sizeof(buf), "Letzte Fahrt: vor %d Tagen", d);
              return buf;

  - platform: homeassistant
    id: bike_maint_count
    entity_id: ${entity_maint_count}
    on_value:
      then:
        - lvgl.label.update:
            id: lvgl_maint_count
            text: !lambda |-
              static char buf[40];
              const int n = (int)id(bike_maint_count).state;
              if (n <= 0)      snprintf(buf, sizeof(buf), "Keine Wartung faellig");
              else if (n == 1) snprintf(buf, sizeof(buf), "1 Wartung faellig");
              else             snprintf(buf, sizeof(buf), "%d Wartungen faellig", n);
              return buf;

  # Wetter (aktuelle Temperatur + 5-Tage-Forecast) kommt jetzt direkt
  # von Open-Meteo, siehe http_request- und interval-Block weiter unten.
  # Kein HA-Sensor mehr noetig.

  # Wochenkilometer im Akkublock unter "Letzte Tour" anzeigen.
  - platform: homeassistant
    id: bike_week_distance
    entity_id: ${entity_week_distance}
    on_value:
      then:
        - lvgl.label.update:
            id: lvgl_week_distance
            text: !lambda |-
              static char buf[32];
              snprintf(buf, sizeof(buf), "Diese Woche: %.0f km", id(bike_week_distance).state);
              return buf;

binary_sensor:
  - platform: homeassistant
    id: bike_charging
    entity_id: ${entity_charger_connected}
    on_state:
      then:
        - lvgl.label.update:
            id: lvgl_charge_icon
            text: !lambda 'return std::string(id(bike_charging).state ? "Laedt" : "");'

text_sensor:
  - platform: homeassistant
    id: bike_maint_next
    entity_id: ${entity_maint_label}
    on_value:
      then:
        - lvgl.label.update:
            id: lvgl_maint_next
            text: !lambda 'return id(bike_maint_next).state.c_str();'

  # Sonnenaufgang + Sonnenuntergang aus dem ESPHome-sun:-Component
  # berechnet. Kein HA-Template-Sensor mehr noetig. Lokale Zeitzone
  # wird automatisch aus der time:-Konfiguration uebernommen.
  - platform: sun
    sun_id: home_sun
    name: "Sun Next Rising"
    type: sunrise
    format: "%H:%M"
    id: esp_sunrise
    on_value:
      then:
        - lvgl.label.update:
            id: lvgl_sunrise
            text: !lambda 'return std::string("\xE2\x86\x91 ") + x;'
  - platform: sun
    sun_id: home_sun
    name: "Sun Next Setting"
    type: sunset
    format: "%H:%M"
    id: esp_sunset
    on_value:
      then:
        - lvgl.label.update:
            id: lvgl_sunset
            text: !lambda 'return std::string("\xE2\x86\x93 ") + x;'

  # (Wetter wird via Open-Meteo-HTTP unten geholt, kein HA-Sensor.)

# ---------------------------------------------------------------------------
# Open-Meteo Wetter (aktuelle Temp + Condition + 5-Tage-Forecast)
# Direkt aus Koordinaten, kein API-Key, keine HA-Sensoren noetig.
# ---------------------------------------------------------------------------
http_request:
  id: http_client
  useragent: "esphome-cockpit/1.0"
  verify_ssl: false
  timeout: 10s

script:
  - id: fetch_weather
    then:
      - http_request.get:
          url: "https://api.open-meteo.com/v1/forecast?latitude=${home_latitude}&longitude=${home_longitude}&current=temperature_2m,weather_code,is_day&daily=weather_code,temperature_2m_max,temperature_2m_min&forecast_days=5&timezone=auto"
          capture_response: true
          on_response:
            then:
              - lambda: |-
                  if (response->status_code != 200) {
                    ESP_LOGW("openmeteo", "HTTP %d", response->status_code);
                    return;
                  }
                  // WMO Weather-Code zu Material-Symbol-Glyph
                  auto code_to_icon = [](int c, bool day) -> std::string {
                    if (c == 0 || c == 1)             return day ? std::string("\xEE\xA0\x9A") : std::string("\xEE\x94\x9C");
                    if (c == 2)                       return std::string("\xEF\x85\xB6");
                    if (c == 3)                       return std::string("\xEE\x8A\xBD");
                    if (c == 45 || c == 48)           return std::string("\xEE\xA0\x98");
                    if (c >= 51 && c <= 67)           return std::string("\xEF\x99\xBF");
                    if (c >= 71 && c <= 77)           return std::string("\xEE\xA0\x8F");
                    if (c >= 80 && c <= 82)           return std::string("\xEF\x99\xBF");
                    if (c == 85 || c == 86)           return std::string("\xEE\xA0\x8F");
                    if (c >= 95)                      return std::string("\xEE\x87\xBF");
                    return std::string("\xEE\xA2\x8E");
                  };
                  ArduinoJson::JsonDocument doc;
                  DeserializationError err = deserializeJson(doc, body);
                  if (err) {
                    ESP_LOGW("openmeteo", "JSON parse: %s", err.c_str());
                    return;
                  }
                  // Aktuelle Werte (Page 1)
                  float cur_temp = doc["current"]["temperature_2m"].as<float>();
                  int   cur_code = doc["current"]["weather_code"].as<int>();
                  bool  is_day   = doc["current"]["is_day"].as<int>() != 0;
                  char tbuf[12];
                  snprintf(tbuf, sizeof(tbuf), "%.1f°C", cur_temp);
                  lv_label_set_text(id(lvgl_weather_temp), tbuf);
                  lv_label_set_text(id(lvgl_weather_icon), code_to_icon(cur_code, is_day).c_str());
                  // 5-Tage-Forecast (Page 2)
                  static const char* WDAY_DE[7] = {"So","Mo","Di","Mi","Do","Fr","Sa"};
                  auto now = id(ha_time).now();
                  int base_wd = now.is_valid() ? now.day_of_week - 1 : 0;
                  auto codes = doc["daily"]["weather_code"];
                  auto maxes = doc["daily"]["temperature_2m_max"];
                  auto mins  = doc["daily"]["temperature_2m_min"];
                  lv_obj_t* name_labels[5] = {id(fc_day0_name), id(fc_day1_name), id(fc_day2_name), id(fc_day3_name), id(fc_day4_name)};
                  lv_obj_t* icon_labels[5] = {id(fc_day0_icon), id(fc_day1_icon), id(fc_day2_icon), id(fc_day3_icon), id(fc_day4_icon)};
                  lv_obj_t* max_labels[5]  = {id(fc_day0_max),  id(fc_day1_max),  id(fc_day2_max),  id(fc_day3_max),  id(fc_day4_max)};
                  lv_obj_t* min_labels[5]  = {id(fc_day0_min),  id(fc_day1_min),  id(fc_day2_min),  id(fc_day3_min),  id(fc_day4_min)};
                  for (int i = 0; i < 5; i++) {
                    int   dc = codes[i].as<int>();
                    float dmax = maxes[i].as<float>();
                    float dmin = mins[i].as<float>();
                    char mxbuf[8], mnbuf[8];
                    snprintf(mxbuf, sizeof(mxbuf), "%.0f°", dmax);
                    snprintf(mnbuf, sizeof(mnbuf), "%.0f°", dmin);
                    lv_label_set_text(name_labels[i], WDAY_DE[(base_wd + i) % 7]);
                    lv_label_set_text(icon_labels[i], code_to_icon(dc, true).c_str());
                    lv_label_set_text(max_labels[i],  mxbuf);
                    lv_label_set_text(min_labels[i],  mnbuf);
                  }
                  ESP_LOGI("openmeteo", "Weather updated: %.1f°C code=%d", cur_temp, cur_code);

# ---------------------------------------------------------------------------
# LVGL UI - Layout aus dem Working-YAML uebernommen (obj-Container mit
# bg_opa: COVER pro Sektion). Statt 6 Slots haben wir hier 7 fest
# zugeordnete eBike-Datenpunkte in vertikalem Stack.
# ---------------------------------------------------------------------------
lvgl:
  rotation: 270
  displays:
    - main_display
  touchscreens:
    - gt911_touch
  on_idle:
    timeout: 1s
    then:
      - lambda: 'id(last_touch_ms) = millis();'

  pages:
    - id: page_main
      bg_color: 0x000000
      widgets:
        # ---------- Top: Datum links + Uhrzeit rechts in ROT ------------
        - obj:
            x: 0
            y: 0
            width: 272
            height: 32
            bg_color: 0x000000
            bg_opa: COVER
            border_width: 0
            pad_all: 0
            scrollbar_mode: "off"
            scrollable: false
            widgets:
              - label:
                  id: lvgl_date
                  x: 8
                  y: 2
                  width: 130
                  text_align: LEFT
                  text_color: 0xFF0000
                  text_font: font_big
                  text: "..."
              - label:
                  id: lvgl_time
                  x: 134
                  y: 2
                  width: 130
                  text_align: RIGHT
                  text_color: 0xFF0000
                  text_font: font_big
                  text: "--:--"

        # ---------- Duenne rote Linie ----------------------------------
        - obj:
            x: 0
            y: 32
            width: 272
            height: 2
            bg_color: 0xFF0000
            bg_opa: COVER
            border_width: 0
            pad_all: 0

        # ---------- Bike-Name zentriert --------------------------------
        - obj:
            x: 0
            y: 38
            width: 272
            height: 26
            bg_color: 0x000000
            bg_opa: COVER
            border_width: 0
            pad_all: 2
            scrollbar_mode: "off"
            scrollable: false
            widgets:
              - label:
                  id: lvgl_bike_name
                  x: 0
                  y: 0
                  width: 272
                  text_align: CENTER
                  text_color: 0xFFB347
                  text_font: font_med
                  text: "${bike_name}"

        # ---------- Wetter zentriert: Icon + Temperatur -----------------
        - obj:
            x: 0
            y: 66
            width: 272
            height: 40
            bg_color: 0x000000
            bg_opa: COVER
            border_width: 0
            pad_all: 2
            scrollbar_mode: "off"
            scrollable: false
            widgets:
              - label:
                  id: lvgl_weather_icon
                  x: 70
                  y: 4
                  text_color: 0x60A5FA
                  text_font: font_weather
                  text: ""
              - label:
                  id: lvgl_weather_temp
                  x: 110
                  y: 6
                  width: 100
                  text_color: 0xCCCCCC
                  text_font: font_big
                  text: "--°C"

