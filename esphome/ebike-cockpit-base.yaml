                  text_color: 0xFACC15
                  text_font: font_small
                  text: ""
              - bar:
                  id: lvgl_battery_bar
                  x: 16
                  y: 56
                  width: 224
                  height: 14
                  min_value: 0
                  max_value: 100
                  value: 0
                  # Bar-Indikator gruen statt LVGL-Default (gelb/orange).
