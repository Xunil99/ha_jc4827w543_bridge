    update_interval: never
    auto_clear_enabled: false

touchscreen:
  - platform: gt911
    id: gt911_touch
    display: main_display
    transform:
      mirror_x: true
      mirror_y: false
    interrupt_pin:
      number: GPIO3
      ignore_strapping_warning: true
    reset_pin: GPIO38

font:
  - file: "gfonts://Inter@500"
    id: font_small
    size: 14
  - file: "gfonts://Inter@500"
    id: font_med
    size: 18
  - file: "gfonts://Inter@600"
    id: font_big
    size: 28
  - file: "gfonts://Inter@700"
    id: font_huge
    size: 36

globals:
  - id: last_touch_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

# ---------------------------------------------------------------------------
# Datenanbindung: HA-Sensoren spiegeln, alle Entitaeten konfigurierbar.
# ---------------------------------------------------------------------------
sensor:
  - platform: homeassistant
    id: bike_battery
    entity_id: ${entity_battery_soc}
    on_value:
      then:
        - lvgl.bar.update:
            id: lvgl_battery_bar
            value: !lambda 'return id(bike_battery).state;'
        - lvgl.label.update:
            id: lvgl_battery_pct
            text: !lambda |-
              static char buf[8];
              snprintf(buf, sizeof(buf), "%.0f %%", id(bike_battery).state);
              return buf;

  - platform: homeassistant
    id: bike_secondary
    entity_id: ${entity_secondary}
    on_value:
      then:
        - lvgl.label.update:
            id: lvgl_secondary
            text: !lambda |-
              static char buf[32];
              snprintf(buf, sizeof(buf), "Letzte Tour: %.1f km", id(bike_secondary).state);
              return buf;

  - platform: homeassistant
    id: bike_odometer
    entity_id: ${entity_odometer}
    on_value:
      then:
        - lvgl.label.update:
            id: lvgl_odometer
            text: !lambda |-
              static char buf[24];
              snprintf(buf, sizeof(buf), "%.0f km gesamt", id(bike_odometer).state);
              return buf;

  - platform: homeassistant
    id: bike_days_since
    entity_id: ${entity_days_since}
    on_value:
      then:
        - lvgl.label.update:
            id: lvgl_days_since
            text: !lambda |-
              static char buf[40];
              const int d = (int)id(bike_days_since).state;
              if (d <= 0)      snprintf(buf, sizeof(buf), "Heute schon gefahren");
              else if (d == 1) snprintf(buf, sizeof(buf), "Letzte Fahrt: gestern");
              else             snprintf(buf, sizeof(buf), "Letzte Fahrt: vor %d Tagen", d);
              return buf;

  - platform: homeassistant
    id: bike_maint_count
    entity_id: ${entity_maint_count}
    on_value:
      then:
        - lvgl.label.update:
            id: lvgl_maint_count
            text: !lambda |-
              static char buf[40];
              const int n = (int)id(bike_maint_count).state;
              if (n <= 0)      snprintf(buf, sizeof(buf), "Keine Wartung faellig");
              else if (n == 1) snprintf(buf, sizeof(buf), "1 Wartung faellig");
              else             snprintf(buf, sizeof(buf), "%d Wartungen faellig", n);
              return buf;

binary_sensor:
  - platform: homeassistant
    id: bike_charging
    entity_id: ${entity_charger_connected}
    on_state:
      then:
        - lvgl.label.update:
            id: lvgl_charge_icon
            text: !lambda 'return std::string(id(bike_charging).state ? "Laedt" : "");'

text_sensor:
  - platform: homeassistant
    id: bike_maint_next
    entity_id: ${entity_maint_label}
    on_value:
      then:
        - lvgl.label.update:
            id: lvgl_maint_next
            text: !lambda 'return id(bike_maint_next).state.c_str();'

# ---------------------------------------------------------------------------
# LVGL UI - Layout aus dem Working-YAML uebernommen (obj-Container mit
# bg_opa: COVER pro Sektion). Statt 6 Slots haben wir hier 7 fest
# zugeordnete eBike-Datenpunkte in vertikalem Stack.
# ---------------------------------------------------------------------------
lvgl:
  rotation: 270
  displays:
    - main_display
  touchscreens:
    - gt911_touch
  on_idle:
    timeout: 1s
    then:
      - lambda: 'id(last_touch_ms) = millis();'

  pages:
    - id: page_main
      bg_color: 0x000000
      widgets:
        # ---------- Build-Marker (Diagnose) -----------------------------
        # Wenn dieses Label "BUILD v0.2" zeigt: neue Firmware laeuft.
        # Wenn es fehlt oder anders aussieht: Flash ist nicht angekommen.
        - obj:
            x: 0
            y: 0
            width: 272
            height: 18
            bg_color: 0xFF0000
            bg_opa: COVER
            border_width: 0
            pad_all: 0
            widgets:
              - label:
                  x: 0
                  y: 0
                  width: 272
                  text_align: CENTER
                  text_color: 0xFFFFFF
                  text_font: font_small
                  text: "BUILD v0.2"

        # ---------- Header: Bike-Name (klein, oben links) ---------------
        - obj:
            x: 0
            y: 18
            width: 272
            height: 28
            bg_color: 0x000000
            bg_opa: COVER
            border_width: 0
            pad_all: 4
            widgets:
              - label:
                  id: lvgl_bike_name
                  x: 8
                  y: 2
                  text_color: 0xFFB347
                  text_font: font_med
                  text: "${bike_name}"

        # ---------- Datum + Uhrzeit ---------------------------------
        - obj:
            x: 0
            y: 28
            width: 272
            height: 110
            bg_color: 0x000000
            bg_opa: COVER
            border_width: 0
            pad_all: 0
            widgets:
              - label:
                  id: lvgl_date
                  x: 0
                  y: 8
                  width: 272
                  text_align: CENTER
                  text_color: 0xCCCCCC
                  text_font: font_med
                  text: "..."
              - label:
                  id: lvgl_time
                  x: 0
                  y: 30
                  width: 272
                  text_align: CENTER
                  text_color: 0xFFFFFF
                  text_font: font_huge
                  text: "--:--"

        # ---------- Akku: Prozent gross, Bar, Sekundaer-Info ---------
        - obj:
            x: 0
            y: 148
            width: 272
            height: 120
            bg_color: 0x0A0A0A
            bg_opa: COVER
            border_color: 0x222222
            border_width: 1
            radius: 8
            pad_all: 8
            widgets:
              - label:
                  id: lvgl_battery_pct
                  x: 0
                  y: 2
                  width: 256
                  text_align: CENTER
                  text_color: 0x4ADE80
                  text_font: font_huge
                  text: "-- %"
              - label:
                  id: lvgl_charge_icon
                  x: 8
                  y: 8
                  text_color: 0xFACC15
                  text_font: font_small
                  text: ""
              - bar:
                  id: lvgl_battery_bar
                  x: 16
                  y: 56
                  width: 224
                  height: 14
                  min_value: 0
                  max_value: 100
                  value: 0
              - label:
                  id: lvgl_secondary
                  x: 0
                  y: 80
                  width: 256
                  text_align: CENTER
                  text_color: 0xAAAAAA
                  text_font: font_med
                  text: ""

        # ---------- Tage seit letzter Fahrt --------------------------
        - obj:
            x: 0
            y: 274
            width: 272
            height: 36
            bg_color: 0x000000
            bg_opa: COVER
            border_width: 0
            pad_all: 4
            widgets:
              - label:
                  id: lvgl_days_since
                  x: 0
                  y: 2
                  width: 264
                  text_align: CENTER
                  text_color: 0xFFFFFF
                  text_font: font_med
                  text: ""

        # ---------- Wartung: Anzahl + Label --------------------------
        - obj:
            x: 0
            y: 316
            width: 272
            height: 110
            bg_color: 0x0A0A0A
            bg_opa: COVER
            border_color: 0x222222
            border_width: 1
            radius: 8
            pad_all: 8
            widgets:
              - label:
                  id: lvgl_maint_count
                  x: 0
                  y: 6
                  width: 256
                  text_align: CENTER
                  text_color: 0xFB923C
                  text_font: font_big
                  text: ""
              - label:
                  id: lvgl_maint_next
                  x: 0
                  y: 56
                  width: 256
                  text_align: CENTER
                  text_color: 0xAAAAAA
                  text_font: font_small
                  text: ""

        # ---------- Kilometerstand (Footer) --------------------------
        - obj:
            x: 0
            y: 440
            width: 272
            height: 32
            bg_color: 0x000000
            bg_opa: COVER
            border_width: 0
            pad_all: 4
            widgets:
              - label:
                  id: lvgl_odometer
                  x: 0
                  y: 2
                  width: 264
                  text_align: CENTER
                  text_color: 0x888888
                  text_font: font_med
                  text: "-- km gesamt"

# ---------------------------------------------------------------------------
# Periodische Updates fuer Datum/Uhrzeit
# Backlight-Idle-Dimming temporaer DEAKTIVIERT - waehrend Diagnose volle
# Helligkeit, damit der Bildschirminhalt eindeutig beurteilt werden kann.
# ---------------------------------------------------------------------------
interval:
  - interval: 1s
    then:
      - lvgl.label.update:
          id: lvgl_date
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("...");
            static const char* days[7]   = {"So","Mo","Di","Mi","Do","Fr","Sa"};
            static const char* months[12]= {"Jan","Feb","Maerz","Apr","Mai","Juni",
                                            "Juli","Aug","Sep","Okt","Nov","Dez"};
            auto ct = t.to_c_tm();
            int wd = ct.tm_wday;     if (wd < 0 || wd > 6)  wd = 0;
            int mo = ct.tm_mon;      if (mo < 0 || mo > 11) mo = 0;
            char b[32];
            snprintf(b, sizeof(b), "%s, %d. %s", days[wd], ct.tm_mday, months[mo]);
            return std::string(b);
      - lvgl.label.update:
          id: lvgl_time
          text: !lambda |-
            char b[8];
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("--:--");
            auto ct = t.to_c_tm();
            strftime(b, sizeof(b), "%H:%M", &ct);
            return std::string(b);
